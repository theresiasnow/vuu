name: Feature request
description: Suggest an improvement for VUU.
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation should this improve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Suggested solution
      description: Describe the behavior you want.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Add radio model, firmware, operating system, or CSV examples if useful.
